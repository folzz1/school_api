name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: RSpec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Run RSpec
        run: docker compose run --rm test

      - name: Stop containers
        if: always()
        run: docker compose down -v